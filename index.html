<!DOCTYPE html>
<html>
<head>
  <title>AI Translator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }

    textarea {
      width: 100%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
    }

    select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>🌐 Translate → Voice</h2>

<textarea id="text" placeholder="Type Khmer or any text..."></textarea>

<select id="voice">
  <option value="en-US-AriaNeural">Female 1</option>
  <option value="en-US-GuyNeural">Male 1</option>
  <option value="en-GB-SoniaNeural">Female 2</option>
  <option value="en-GB-RyanNeural">Male 2</option>
</select>

<button onclick="send()">🎙 Generate Voice</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function send() {
  const text = document.getElementById("text").value;
  const voice = document.getElementById("voice").value;

  tg.sendData(text + "|" + voice);
}
</script>

</body>
</html>
